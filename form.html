<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>My Practice Form</h1>
    <form action="">
        <label>First Name</label>
        <input type="text" placeholder="Enter your first name here" id="first-name" required>
        <label>Last Name</label>
        <input type="text" placeholder="Enter youir last name here" id="last-name" required>
        <label>DOB</label>
        <input type="date" id="dob" required>
        <label>Password</label>
        <input type="password" id="password" required>
        <label>Email</label>
        <input type="email" id="email" required>
        <label>Phone Numner</label>
        <input type="tel" id="telephone">
        <label>State of Origin</label>
        <select>
            <option>Enugu</option>
            <option>Imo</option>
            <option>Anambrsa</option>
            <option>Delta</option>
            <option>Edo</option>
            <option>Abonyi</option>
            <option>Kano</option>
            <option>Lagos</option>
            <option>Abia</option>
            <option>Kogi</option>
        </select>
        <p>Gender:</p>
        <label><input type="radio" name="gender">Male</label>
        <label><input type="radio" name="gender">Female</label>
        <label><input type="radio" name="gender">Other</label>
        

        <p>Choose your Courses:</p>
        <label><input type="checkbox">Englsh</label>
        <label><input type="checkbox">Maths</label>
        <label><input type="checkbox">History</label>
        <label><input type="checkbox">Biology</label>
        <label><input type="checkbox">Physics</label>
        <label><input type="checkbox">Fine Art</label>
        <label><input type="checkbox">Chemistry</label>
        <label><input type="checkbox">Music</label>
        <label><input type="checkbox">Computer</label>
    
        <button type="submit">Submit</button>
        <button type="reset">Reset</button>
    </form><hr>
